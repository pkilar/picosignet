# Environment overrides for picosignet-bridge.service.
#
# The bridge exposes the PicoSignet HSM's newline-JSON protocol to clients such
# as cerberus ssh-cert-api. With no arguments it listens on vsock:5000 (the
# enclave contract); set PICOSIGNET_BRIDGE_ARGS to change that. After editing,
# run: systemctl restart picosignet-bridge.service
#
# Everything below is commented out — the service uses the built-in defaults
# unless you uncomment and set PICOSIGNET_BRIDGE_ARGS.

# Serve a local Unix socket instead of vsock (co-located ssh-cert-api):
#PICOSIGNET_BRIDGE_ARGS=--listen unix:/run/picosignet/bridge.sock

# Serve both vsock (signing) and a local Unix socket that also permits device
# management commands (provisioning), keeping mgmt off the network listener:
#PICOSIGNET_BRIDGE_ARGS=--listen vsock:5000,unix:/run/picosignet/bridge.sock+mgmt

# Pin a specific serial device instead of auto-discovery, and/or a TCP listener:
#PICOSIGNET_BRIDGE_ARGS=--port /dev/picosignet --listen tcp:127.0.0.1:5000
