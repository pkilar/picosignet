name: ci

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-host:
    name: rust host (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --exclude hsm-fw --all-targets -- -D warnings
      - run: cargo test
      - run: bash tests/golden/verify_golden.sh

  rust-firmware:
    name: firmware cross-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv8m.main-none-eabihf
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p hsm-fw --target thumbv8m.main-none-eabihf -- -D warnings
      - run: cargo build -p hsm-fw --target thumbv8m.main-none-eabihf --release

  go-host:
    name: go host (vet, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: host/go.sum
      - working-directory: host
        run: |
          go vet ./...
          go test ./...

  differential:
    name: differential (HSM cert == x/crypto/ssh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: tests/differential/go.sum
      - working-directory: tests/differential
        run: go test ./...
