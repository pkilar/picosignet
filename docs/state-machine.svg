<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 660" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1b2030" flood-opacity="0.16"/>
    </filter>
    <marker id="mi" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#4f46e5"/></marker>
    <marker id="mg" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#15924f"/></marker>
    <marker id="mr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#c62828"/></marker>
    <marker id="ms" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#5b6478"/></marker>
    <marker id="ma" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#c08a2e"/></marker>
  </defs>

  <rect width="1120" height="660" fill="#f7f8fc"/>
  <text x="40" y="44" fill="#1b2030" font-size="22" font-weight="700">PicoSignet device state machine</text>
  <text x="40" y="67" fill="#5b6478" font-size="13">Node accent colour matches the status LED. Mode changes (dev ↔ prod) only ever go through factoryReset, which destroys the key.</text>

  <!-- ===== transitions (drawn first, under nodes) ===== -->
  <!-- init(dev): Uninitialized -> DevReady -->
  <path d="M255 232 L425 132" fill="none" stroke="#4f46e5" stroke-width="2.4" marker-end="url(#mi)"/>
  <text x="318" y="170" fill="#4f46e5" font-size="12.5" font-weight="600" transform="rotate(-30 318 170)">init(dev)</text>

  <!-- init(prod,pin): Uninitialized -> ProdLocked -->
  <path d="M265 266 L420 296" fill="none" stroke="#4f46e5" stroke-width="2.4" marker-end="url(#mi)"/>
  <text x="300" y="270" fill="#4f46e5" font-size="12.5" font-weight="600">init(prod, pin)</text>

  <!-- DevReady self-loop: generateKey / reboot reloads -->
  <path d="M495 78 C485 40, 555 40, 545 78" fill="none" stroke="#5b6478" stroke-width="2" marker-end="url(#ms)"/>
  <text x="520" y="32" text-anchor="middle" fill="#5b6478" font-size="12">generateKey · reboot reloads key</text>

  <!-- ProdLocked self-loop: unlock fail, retries remain -->
  <path d="M495 268 C485 230, 555 230, 545 268" fill="none" stroke="#c08a2e" stroke-width="2" marker-end="url(#ma)"/>
  <text x="520" y="222" text-anchor="middle" fill="#9a7b34" font-size="12">unlock ✗ — retries remain (backoff)</text>

  <!-- ProdLocked -> ProdReady: unlock ok -->
  <path d="M620 292 L803 292" fill="none" stroke="#15924f" stroke-width="2.4" marker-end="url(#mg)"/>
  <text x="712" y="283" text-anchor="middle" fill="#15924f" font-size="12.5" font-weight="600">unlock ✓ → key to RAM</text>

  <!-- ProdReady -> ProdLocked: lock / reset / suspend -->
  <path d="M805 312 L622 312" fill="none" stroke="#5b6478" stroke-width="2.4" marker-end="url(#ms)"/>
  <text x="712" y="329" text-anchor="middle" fill="#5b6478" font-size="12">lock · USB reset · suspend</text>

  <!-- ProdReady self-loop: sign / rotate -->
  <path d="M880 268 C870 230, 940 230, 930 268" fill="none" stroke="#5b6478" stroke-width="2" marker-end="url(#ms)"/>
  <text x="905" y="222" text-anchor="middle" fill="#5b6478" font-size="12">signSshKey · generateKey(force)</text>

  <!-- ProdLocked -> LockedOut -->
  <path d="M520 332 L520 406" fill="none" stroke="#c62828" stroke-width="2.4" marker-end="url(#mr)"/>
  <text x="532" y="374" fill="#c62828" font-size="12.5" font-weight="600">retry budget exhausted</text>

  <!-- LockedOut -> Uninitialized: factoryReset (only escape) -->
  <path d="M420 432 C250 432, 165 360, 165 284" fill="none" stroke="#c62828" stroke-width="2.4" stroke-dasharray="6 4" marker-end="url(#mr)"/>
  <text x="250" y="408" fill="#c62828" font-size="12.5" font-weight="600">factoryReset — only escape</text>

  <!-- ===== state nodes ===== -->
  <!-- Uninitialized (blue) center 165,250 -->
  <g filter="url(#sh)"><rect x="65" y="218" width="200" height="64" rx="11" fill="#eaf1fe" stroke="#2563eb" stroke-width="1.5"/></g>
  <rect x="65" y="218" width="7" height="64" rx="3.5" fill="#2563eb"/>
  <text x="172" y="246" text-anchor="middle" fill="#16356e" font-size="16.5" font-weight="700">Uninitialized</text>
  <text x="172" y="266" text-anchor="middle" fill="#5b6478" font-size="12">no key · no config</text>

  <!-- DevReady (green) center 520,110 -->
  <g filter="url(#sh)"><rect x="420" y="78" width="200" height="64" rx="11" fill="#e6f4ec" stroke="#15924f" stroke-width="1.5"/></g>
  <rect x="420" y="78" width="7" height="64" rx="3.5" fill="#15924f"/>
  <text x="527" y="106" text-anchor="middle" fill="#0e5e33" font-size="16.5" font-weight="700">DevReady</text>
  <text x="527" y="126" text-anchor="middle" fill="#5b6478" font-size="12">operational · key auto-loads</text>

  <!-- ProdLocked (amber) center 520,300 -->
  <g filter="url(#sh)"><rect x="420" y="268" width="200" height="64" rx="11" fill="#fbf3df" stroke="#c08a2e" stroke-width="1.5"/></g>
  <rect x="420" y="268" width="7" height="64" rx="3.5" fill="#c08a2e"/>
  <text x="527" y="296" text-anchor="middle" fill="#7a5b12" font-size="16.5" font-weight="700">ProdLocked</text>
  <text x="527" y="316" text-anchor="middle" fill="#5b6478" font-size="12">key sealed · PIN required</text>

  <!-- ProdReady (green) center 905,300 -->
  <g filter="url(#sh)"><rect x="805" y="268" width="200" height="64" rx="11" fill="#e6f4ec" stroke="#15924f" stroke-width="1.5"/></g>
  <rect x="805" y="268" width="7" height="64" rx="3.5" fill="#15924f"/>
  <text x="912" y="296" text-anchor="middle" fill="#0e5e33" font-size="16.5" font-weight="700">ProdReady</text>
  <text x="912" y="316" text-anchor="middle" fill="#5b6478" font-size="12">unlocked · can sign</text>

  <!-- LockedOut (red) center 520,440 -->
  <g filter="url(#sh)"><rect x="420" y="408" width="200" height="64" rx="11" fill="#fdeaea" stroke="#c62828" stroke-width="1.5"/></g>
  <rect x="420" y="408" width="7" height="64" rx="3.5" fill="#c62828"/>
  <text x="527" y="436" text-anchor="middle" fill="#8c1d1d" font-size="16.5" font-weight="700">LockedOut</text>
  <text x="527" y="456" text-anchor="middle" fill="#5b6478" font-size="12">retry budget spent</text>

  <!-- ===== legend ===== -->
  <rect x="40" y="512" width="1040" height="120" rx="12" fill="#ffffff" stroke="#d8deea"/>
  <text x="60" y="538" fill="#5b6478" font-size="12.5" font-weight="700" letter-spacing="1.2">CROSS-CUTTING RULES</text>
  <g font-size="13" fill="#3a4258">
    <text x="60" y="560"><tspan fill="#c62828" font-weight="600">factoryReset</tspan> — from ANY state ⇒ Uninitialized; destroys the key. The only way to switch dev ↔ prod, and the only escape from LockedOut.</text>
    <text x="60" y="582"><tspan font-weight="600">Always allowed (any state):</tspan> ping · status · setTime · selfTest · addEntropy · getEnclaveMetrics.</text>
    <text x="60" y="604"><tspan font-weight="600">getPublicKey:</tspan> any state once a key exists (public key is stored in the clear).</text>
    <text x="60" y="626"><tspan font-weight="600">signSshKey / loadKeySigner:</tspan> only in DevReady or ProdReady, with a key present and the clock set.</text>
  </g>
</svg>
