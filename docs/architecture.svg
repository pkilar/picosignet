<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1b2030" flood-opacity="0.14"/>
    </filter>
    <marker id="ai" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4f46e5"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#15924f"/>
    </marker>
    <marker id="as" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5b6478"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="#f7f8fc"/>

  <!-- Title -->
  <text x="40" y="46" fill="#1b2030" font-size="23" font-weight="700">PicoSignet — architecture</text>
  <text x="40" y="70" fill="#5b6478" font-size="13.5">One no_std core, two HAL backends (real RP2350 silicon + a host mock); a Go bridge speaks the cerberus wire protocol unchanged.</text>

  <!-- ===================== RUNTIME DATA PATH ===================== -->
  <text x="40" y="104" fill="#5b6478" font-size="12.5" font-weight="700" letter-spacing="1.4">RUNTIME DATA PATH</text>

  <!-- ssh-cert-api -->
  <rect x="40" y="118" width="226" height="96" rx="12" fill="#ffffff" stroke="#d8deea" filter="url(#sh)"/>
  <text x="153" y="156" text-anchor="middle" fill="#2b2f55" font-size="16.5" font-weight="700">ssh-cert-api</text>
  <text x="153" y="178" text-anchor="middle" fill="#5b6478" font-size="12.5">cerberus · unmodified</text>
  <text x="153" y="196" text-anchor="middle" fill="#5b6478" font-size="12.5">authn / authz, then asks for a cert</text>

  <!-- picosignet bridge+CLI -->
  <rect x="312" y="118" width="252" height="96" rx="12" fill="#eef0fe" stroke="#c7ccf6" filter="url(#sh)"/>
  <text x="438" y="152" text-anchor="middle" fill="#2b2f55" font-size="16.5" font-weight="700">picosignet</text>
  <text x="438" y="173" text-anchor="middle" fill="#5b6478" font-size="12.5">bridge + CLI · Go (host/)</text>
  <text x="438" y="191" text-anchor="middle" fill="#5b6478" font-size="12">vsock · tcp · unix · firewalls mgmt</text>
  <text x="438" y="207" text-anchor="middle" fill="#5b6478" font-size="12">pushes wall-clock time</text>

  <!-- USB boundary -->
  <line x1="606" y1="100" x2="606" y2="300" stroke="#9aa3b8" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="606" y="96" text-anchor="middle" fill="#5b6478" font-size="11.5">USB</text>

  <!-- hsm-fw (device) -->
  <rect x="650" y="104" width="300" height="124" rx="13" fill="none" stroke="#9aa3b8" stroke-width="1.3" stroke-dasharray="6 5"/>
  <text x="664" y="122" fill="#5b6478" font-size="11" font-weight="700" letter-spacing="0.5">RP2350 DEVICE</text>
  <rect x="666" y="130" width="268" height="84" rx="11" fill="#fbf3df" stroke="#e0c178" filter="url(#sh)"/>
  <text x="800" y="160" text-anchor="middle" fill="#7a5b12" font-size="16.5" font-weight="700">hsm-fw</text>
  <text x="800" y="181" text-anchor="middle" fill="#9a7b34" font-size="12.5">Embassy firmware</text>
  <text x="800" y="199" text-anchor="middle" fill="#9a7b34" font-size="11.5">USB · QSPI flash · TRNG · OTP · glitch · timer · LED</text>

  <!-- data-path arrows (bidirectional) -->
  <line x1="266" y1="160" x2="312" y2="160" stroke="#4f46e5" stroke-width="2.5" marker-start="url(#ai)" marker-end="url(#ai)"/>
  <text x="289" y="150" text-anchor="middle" fill="#5b6478" font-size="10.5">JSON</text>

  <line x1="564" y1="160" x2="666" y2="160" stroke="#4f46e5" stroke-width="2.5" marker-start="url(#ai)" marker-end="url(#ai)"/>
  <text x="615" y="150" text-anchor="middle" fill="#2b2f55" font-size="11.5" font-weight="600">USB CDC-ACM</text>
  <text x="615" y="180" text-anchor="middle" fill="#15924f" font-size="11">request ⇄ signed cert</text>

  <text x="40" y="250" fill="#5b6478" font-size="12">Newline-delimited JSON end to end. The bridge reproduces the enclave's framing, limits and 32-conn cap; the signer-path</text>
  <text x="40" y="268" fill="#5b6478" font-size="12">protocol (signSshKey · ping · loadKeySigner · getEnclaveMetrics) is byte-compatible with cerberus — clients need no changes.</text>

  <!-- ===================== SHARED CORE ===================== -->
  <text x="360" y="322" fill="#5b6478" font-size="12.5" font-weight="700" letter-spacing="1.4">SHARED CORE — one logic crate, two HAL backends</text>

  <!-- hsm-core box -->
  <rect x="360" y="336" width="560" height="196" rx="14" fill="#ffffff" stroke="#c7ccf6" stroke-width="1.5" filter="url(#sh)"/>
  <!-- HAL seam strip -->
  <rect x="360" y="336" width="560" height="40" rx="14" fill="#eef0fe"/>
  <rect x="360" y="360" width="560" height="16" fill="#eef0fe"/>
  <text x="640" y="361" text-anchor="middle" fill="#4f46e5" font-size="13" font-weight="700">HAL traits — EntropySource · Monotonic · FlashStore</text>

  <text x="384" y="406" fill="#2b2f55" font-size="17" font-weight="700">hsm-core</text>
  <rect x="476" y="392" width="118" height="20" rx="10" fill="#e6f4ec"/>
  <text x="535" y="406" text-anchor="middle" fill="#15924f" font-size="11.5" font-weight="600">no_std + alloc</text>
  <text x="384" y="428" fill="#5b6478" font-size="12.5">All protocol / crypto / state logic — hardware-agnostic, fully host-tested.</text>

  <g font-size="12.5" fill="#3a4258">
    <text x="384" y="458">• protocol state machine</text>
    <text x="384" y="480">• request validation (cerberus-parity)</text>
    <text x="384" y="502">• OpenSSH certificate encoder</text>
    <text x="652" y="458">• ChaCha20 DRBG (TRNG-seeded)</text>
    <text x="652" y="480">• key wrapping (OTP-bound KEKs)</text>
    <text x="652" y="502">• A/B flash storage · PIN counter</text>
  </g>

  <!-- real HAL: hsm-fw -> hsm-core -->
  <line x1="800" y1="214" x2="800" y2="336" stroke="#c08a2e" stroke-width="2.5" marker-end="url(#ai)"/>
  <rect x="812" y="258" width="150" height="40" rx="8" fill="#fbf3df" stroke="#e0c178"/>
  <text x="887" y="274" text-anchor="middle" fill="#7a5b12" font-size="11.5" font-weight="600">real HAL (silicon)</text>
  <text x="887" y="290" text-anchor="middle" fill="#9a7b34" font-size="10.5">TRNG · QSPI · OTP</text>

  <!-- ===================== HOST TEST HARNESS ===================== -->
  <text x="40" y="322" fill="#5b6478" font-size="12.5" font-weight="700" letter-spacing="1.4">HOST TEST HARNESS</text>

  <!-- hsm-sim -->
  <rect x="40" y="336" width="250" height="92" rx="12" fill="#fde7f0" stroke="#f0b8cf" filter="url(#sh)"/>
  <text x="165" y="368" text-anchor="middle" fill="#8a1742" font-size="16.5" font-weight="700">hsm-sim</text>
  <text x="165" y="389" text-anchor="middle" fill="#a83a64" font-size="12.5">std binary · mock HAL</text>
  <text x="165" y="407" text-anchor="middle" fill="#a83a64" font-size="12">stdin / stdout</text>

  <!-- mock HAL: hsm-sim -> hsm-core -->
  <line x1="290" y1="382" x2="360" y2="382" stroke="#d81b60" stroke-width="2.5" marker-end="url(#ai)"/>
  <text x="325" y="373" text-anchor="middle" fill="#a83a64" font-size="10.5">mock HAL</text>

  <!-- tests -->
  <rect x="40" y="470" width="250" height="98" rx="12" fill="#ffffff" stroke="#d8deea" filter="url(#sh)"/>
  <text x="165" y="500" text-anchor="middle" fill="#2b2f55" font-size="14.5" font-weight="700">tests/golden · differential</text>
  <text x="165" y="522" text-anchor="middle" fill="#5b6478" font-size="12">deterministic golden vectors;</text>
  <text x="165" y="539" text-anchor="middle" fill="#5b6478" font-size="12">field-level cert diff vs</text>
  <text x="165" y="556" text-anchor="middle" fill="#5b6478" font-size="12">x/crypto/ssh (byte-identical)</text>

  <line x1="165" y1="470" x2="165" y2="428" stroke="#5b6478" stroke-width="2" marker-end="url(#as)"/>
  <text x="232" y="452" text-anchor="middle" fill="#5b6478" font-size="10.5">drive</text>

  <!-- footnote -->
  <text x="360" y="566" fill="#5b6478" font-size="11.5">Same hsm-core, two implementations of the HAL seam: the firmware binds it to RP2350 peripherals; the simulator binds it</text>
  <text x="360" y="583" fill="#5b6478" font-size="11.5">to an in-memory mock — so every security-critical path is exercised on a workstation, and the firmware stays a thin shim.</text>

  <!-- host (Go) reuse note -->
  <text x="40" y="624" fill="#5b6478" font-size="11.5">host/ (Go) reuses cerberus's `messages` module for the signer-path wire types; it adds only the bridge + management CLI.</text>
</svg>
