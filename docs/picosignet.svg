<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b2d6e"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="dev" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef1fb"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1b2030" flood-opacity="0.16"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4f46e5"/>
    </marker>
    <marker id="arrg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#15924f"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#f7f8fc"/>

  <!-- Header -->
  <rect width="1200" height="104" fill="url(#hdr)"/>
  <!-- Signet seal mark -->
  <g transform="translate(58,52)">
    <circle r="31" fill="#d4a017"/>
    <circle r="31" fill="none" stroke="#f3d488" stroke-width="2"/>
    <circle r="22" fill="#2b2f55"/>
    <!-- keyhole -->
    <circle cy="-5" r="6" fill="#fff"/>
    <path d="M-5 -2 L5 -2 L8 12 L-8 12 z" fill="#fff"/>
  </g>
  <text x="104" y="50" fill="#ffffff" font-size="38" font-weight="700">PicoSignet</text>
  <text x="106" y="80" fill="#cdd2f7" font-size="18">RP2350 USB HSM — an on-device SSH certificate-signing CA you hold in your hand</text>
  <g font-size="13" fill="#ffffff" text-anchor="middle">
    <rect x="930" y="30" width="74" height="26" rx="13" fill="#ffffff" fill-opacity="0.16"/><text x="967" y="48">RP2350</text>
    <rect x="1010" y="30" width="78" height="26" rx="13" fill="#ffffff" fill-opacity="0.16"/><text x="1049" y="48">Ed25519</text>
    <rect x="1094" y="30" width="78" height="26" rx="13" fill="#ffffff" fill-opacity="0.16"/><text x="1133" y="48">USB-HSM</text>
  </g>

  <!-- ===================== HOST ===================== -->
  <text x="44" y="150" fill="#5b6478" font-size="13" font-weight="700" letter-spacing="1.5">HOST WORKSTATION / SERVER</text>
  <rect x="40" y="162" width="300" height="300" rx="16" fill="#ffffff" stroke="#d8deea" filter="url(#sh)"/>

  <rect x="64" y="190" width="252" height="64" rx="10" fill="#eef0fe" stroke="#c7ccf6"/>
  <text x="190" y="217" text-anchor="middle" fill="#2b2f55" font-size="16" font-weight="600">ssh-cert-api</text>
  <text x="190" y="238" text-anchor="middle" fill="#5b6478" font-size="13">cerberus — unmodified</text>

  <rect x="64" y="282" width="252" height="78" rx="10" fill="#eef0fe" stroke="#c7ccf6"/>
  <text x="190" y="308" text-anchor="middle" fill="#2b2f55" font-size="16" font-weight="600">picosignet bridge</text>
  <text x="190" y="329" text-anchor="middle" fill="#5b6478" font-size="13">Go · vsock / tcp / unix</text>
  <text x="190" y="348" text-anchor="middle" fill="#5b6478" font-size="13">pushes time · firewalls mgmt</text>

  <line x1="190" y1="254" x2="190" y2="282" stroke="#4f46e5" stroke-width="2" marker-end="url(#arr)"/>
  <text x="64" y="392" fill="#5b6478" font-size="12.5">Drop-in replacement for the AWS Nitro</text>
  <text x="64" y="410" fill="#5b6478" font-size="12.5">Enclave signer — same newline-JSON wire</text>
  <text x="64" y="428" fill="#5b6478" font-size="12.5">protocol, so clients work unchanged.</text>

  <!-- ===================== USB LINK ===================== -->
  <g transform="translate(340,300)">
    <line x1="8" y1="0" x2="200" y2="0" stroke="#4f46e5" stroke-width="3" marker-end="url(#arr)"/>
    <line x1="200" y1="26" x2="8" y2="26" stroke="#4f46e5" stroke-width="3" marker-end="url(#arr)"/>
    <text x="104" y="-12" text-anchor="middle" fill="#2b2f55" font-size="13" font-weight="600">USB CDC-ACM</text>
    <text x="104" y="48" text-anchor="middle" fill="#5b6478" font-size="12">request ⇄ signed cert</text>
  </g>

  <!-- ===================== DEVICE ===================== -->
  <text x="564" y="150" fill="#5b6478" font-size="13" font-weight="700" letter-spacing="1.5">THE DEVICE — RP2350 USB KEY (Waveshare RP2350-One)</text>
  <rect x="560" y="162" width="600" height="372" rx="18" fill="url(#dev)" stroke="#c7ccf6" stroke-width="1.5" filter="url(#sh)"/>
  <!-- status LED -->
  <circle cx="1132" cy="190" r="7" fill="#15924f"/>
  <text x="1120" y="194" text-anchor="end" fill="#5b6478" font-size="11">WS2812 status LED</text>

  <!-- CA vault (centerpiece) -->
  <rect x="590" y="206" width="540" height="96" rx="12" fill="#fbf3df" stroke="#d4a017" stroke-width="2"/>
  <g transform="translate(622,254)">
    <rect x="-16" y="-14" width="32" height="26" rx="4" fill="#d4a017"/>
    <path d="M-9 -14 v-6 a9 9 0 0 1 18 0 v6" fill="none" stroke="#d4a017" stroke-width="4"/>
    <circle cy="-2" r="4" fill="#fbf3df"/>
  </g>
  <text x="662" y="244" fill="#7a5b12" font-size="18" font-weight="700">CA Ed25519 private key</text>
  <text x="662" y="268" fill="#9a7b34" font-size="13.5">generated on-device from the hardware TRNG —</text>
  <text x="662" y="286" fill="#9a7b34" font-size="13.5">never exported; only the CA public key leaves.</text>

  <!-- four security badges -->
  <g font-size="14">
    <!-- TRNG -->
    <rect x="590" y="322" width="258" height="86" rx="10" fill="#ffffff" stroke="#d8deea"/>
    <circle cx="616" cy="350" r="11" fill="#eef0fe" stroke="#4f46e5"/>
    <path d="M609 351 q3.5 -7 7 0 t7 0" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>
    <text x="638" y="349" fill="#2b2f55" font-weight="600">Hardware TRNG</text>
    <text x="608" y="376" fill="#5b6478" font-size="12.5">SP800-90B health-checked,</text>
    <text x="608" y="393" fill="#5b6478" font-size="12.5">SHA-512 → ChaCha20 DRBG.</text>

    <!-- OTP -->
    <rect x="872" y="322" width="258" height="86" rx="10" fill="#ffffff" stroke="#d8deea"/>
    <circle cx="898" cy="350" r="11" fill="#fde7f0" stroke="#d81b60"/>
    <rect x="893" y="350" width="10" height="7" rx="1.3" fill="#d81b60"/>
    <path d="M895 350 v-2.5 a3 3 0 0 1 6 0 v2.5" fill="none" stroke="#d81b60" stroke-width="1.8"/>
    <text x="920" y="349" fill="#2b2f55" font-weight="600">OTP-bound key wrap</text>
    <text x="890" y="376" fill="#5b6478" font-size="12.5">Per-device secret locked in</text>
    <text x="890" y="393" fill="#5b6478" font-size="12.5">on-die OTP — a flash dump is useless.</text>

    <!-- Glitch -->
    <rect x="590" y="420" width="258" height="86" rx="10" fill="#ffffff" stroke="#d8deea"/>
    <circle cx="616" cy="448" r="11" fill="#fbf3df" stroke="#d4a017"/>
    <path d="M618 442 l-6 8 h4 l-3 6 7 -9 h-4 z" fill="#b8860b"/>
    <text x="638" y="447" fill="#2b2f55" font-weight="600">Glitch detectors</text>
    <text x="608" y="474" fill="#5b6478" font-size="12.5">Armed at boot; a voltage fault</text>
    <text x="608" y="491" fill="#5b6478" font-size="12.5">hard-resets the core domain.</text>

    <!-- Secure boot -->
    <rect x="872" y="420" width="258" height="86" rx="10" fill="#ffffff" stroke="#d8deea"/>
    <circle cx="898" cy="448" r="11" fill="#e6f4ec" stroke="#15924f"/>
    <path d="M893 448 l3.5 4 6 -8" fill="none" stroke="#15924f" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="920" y="447" fill="#2b2f55" font-weight="600">Secure boot</text>
    <text x="890" y="474" fill="#5b6478" font-size="12.5">Production devices run only</text>
    <text x="890" y="491" fill="#5b6478" font-size="12.5">project-signed firmware.</text>
  </g>

  <!-- back arrow device -> host (signed cert), drawn subtly under link already; add a green return note -->
  <line x1="560" y1="470" x2="360" y2="470" stroke="#15924f" stroke-width="2.5" marker-end="url(#arrg)"/>
  <text x="460" y="462" text-anchor="middle" fill="#15924f" font-size="12.5" font-weight="600">signed SSH certificate</text>

  <!-- ===================== FOOTER PROPERTIES ===================== -->
  <text x="44" y="586" fill="#5b6478" font-size="13" font-weight="700" letter-spacing="1.5">WHAT IT GUARANTEES</text>
  <g>
    <rect x="40" y="600" width="272" height="120" rx="12" fill="#ffffff" stroke="#d8deea" filter="url(#sh)"/>
    <text x="60" y="632" fill="#2b2f55" font-size="15" font-weight="700">Key never leaves</text>
    <text x="60" y="657" fill="#5b6478" font-size="13">The private CA half is born on the</text>
    <text x="60" y="675" fill="#5b6478" font-size="13">device and only ever exists off it</text>
    <text x="60" y="693" fill="#5b6478" font-size="13">as ciphertext. Only the public key</text>
    <text x="60" y="711" fill="#5b6478" font-size="13">is exportable.</text>

    <rect x="328" y="600" width="272" height="120" rx="12" fill="#ffffff" stroke="#d8deea" filter="url(#sh)"/>
    <text x="348" y="632" fill="#2b2f55" font-size="15" font-weight="700">Two modes</text>
    <text x="348" y="657" fill="#5b6478" font-size="13"><tspan font-weight="600" fill="#15924f">Dev</tspan> — signs the moment it's</text>
    <text x="348" y="675" fill="#5b6478" font-size="13">plugged in.</text>
    <text x="348" y="697" fill="#5b6478" font-size="13"><tspan font-weight="600" fill="#d81b60">Production</tspan> — PIN/passphrase</text>
    <text x="348" y="715" fill="#5b6478" font-size="13">unlock, lockout + backoff.</text>

    <rect x="616" y="600" width="272" height="120" rx="12" fill="#ffffff" stroke="#d8deea" filter="url(#sh)"/>
    <text x="636" y="632" fill="#2b2f55" font-size="15" font-weight="700">Short-lived certs</text>
    <text x="636" y="657" fill="#5b6478" font-size="13">Principal-scoped OpenSSH user</text>
    <text x="636" y="675" fill="#5b6478" font-size="13">certificates, validity ≤ 24 h —</text>
    <text x="636" y="693" fill="#5b6478" font-size="13">byte-identical to what the Nitro</text>
    <text x="636" y="711" fill="#5b6478" font-size="13">enclave would issue.</text>

    <rect x="904" y="600" width="256" height="120" rx="12" fill="#ffffff" stroke="#d8deea" filter="url(#sh)"/>
    <text x="924" y="632" fill="#2b2f55" font-size="15" font-weight="700">Drop-in</text>
    <text x="924" y="657" fill="#5b6478" font-size="13">Wire-compatible with cerberus</text>
    <text x="924" y="675" fill="#5b6478" font-size="13">ssh-cert-signer; existing clients</text>
    <text x="924" y="693" fill="#5b6478" font-size="13">sign through the bridge with no</text>
    <text x="924" y="711" fill="#5b6478" font-size="13">code changes.</text>
  </g>
</svg>
